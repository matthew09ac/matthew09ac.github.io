<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>日语分区背词</title>
<style>
body{font-family:sans-serif;background:#f6efe6;margin:0;padding:20px}
button{margin:5px;padding:10px;border-radius:10px}
.card{background:white;padding:15px;border-radius:15px;margin-top:10px}
</style>
</head>
<body>

<h2>选择 Section</h2>
<div id="sections"></div>

<div class="card" id="study" style="display:none">
<h3 id="word"></h3>
<p id="reading"></p>
<button onclick="show()">显示意思</button>
<p id="meaning"></p>
<button onclick="next()">下一题</button>
</div>

<script src="data.js"></script>
<script>
let current = [];
let index = 0;

function loadSections(){
  const el=document.getElementById("sections");
  sections.forEach((s,i)=>{
    const b=document.createElement("button");
    b.innerText="Section "+(i+1);
    b.onclick=()=>start(i);
    el.appendChild(b);
  });
}

function start(i){
  current = sections[i];
  index = 0;
  document.getElementById("study").style.display="block";
  next();
}

function next(){
  if(index>=current.length) index=0;
  const w=current[index++];
  document.getElementById("word").innerText=w.word;
  document.getElementById("reading").innerText=w.reading;
  document.getElementById("meaning").innerText="";
  window.cur=w;
}

function show(){
  document.getElementById("meaning").innerText=window.cur.meaning;
}

loadSections();
</script>
</body>
</html>
